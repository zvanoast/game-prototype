name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_setup:
        description: "Run EC2 setup script (first deploy or infra changes)"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build:client

      - name: Package deploy artifact
        run: tar czf deploy.tar.gz client/dist client/package.json server shared package.json package-lock.json scripts

      - name: Copy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/deploy_key deploy.tar.gz "$EC2_USER@$EC2_HOST":~/deploy.tar.gz

      - name: EC2 setup (first deploy only)
        if: ${{ github.event.inputs.run_setup == 'true' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            mkdir -p ~/game-prototype
            cd ~/game-prototype
            tar xzf ~/deploy.tar.gz
            bash scripts/ec2-setup.sh

      - name: Install deps and restart server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 3m
          script: |
            export PATH="/usr/local/bin:/usr/bin:$PATH"
            mkdir -p ~/game-prototype
            cd ~/game-prototype
            tar xzf ~/deploy.tar.gz
            rm ~/deploy.tar.gz
            npm ci
            pm2 restart game-prototype || pm2 start npm --name game-prototype -- run start:prod
            pm2 save

            # Verify server is healthy
            sleep 5
            pm2 ls
            curl -sf http://localhost:3001/api/health || { echo "--- PM2 LOGS ---"; pm2 logs game-prototype --nostream --lines 30; exit 1; }
