name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_setup:
        description: "Run EC2 setup script (first deploy or infra changes)"
        type: boolean
        default: false

env:
  DEPLOY_HOST: ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build:client

      - name: Package deploy artifact
        run: tar czf deploy.tar.gz client/dist client/package.json server shared package.json package-lock.json tsconfig.base.json scripts

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Configure SSH
        run: |
          echo -e "Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n  LogLevel ERROR" >> ~/.ssh/config

      - name: Copy artifact to EC2
        run: scp deploy.tar.gz ${{ env.DEPLOY_HOST }}:~/deploy.tar.gz

      - name: EC2 setup (first deploy only)
        if: ${{ github.event.inputs.run_setup == 'true' }}
        run: |
          ssh ${{ env.DEPLOY_HOST }} << 'SETUP'
            mkdir -p ~/game-prototype && cd ~/game-prototype
            tar xzf ~/deploy.tar.gz
            bash scripts/ec2-setup.sh
          SETUP

      - name: Install deps and restart server
        run: |
          ssh ${{ env.DEPLOY_HOST }} << 'DEPLOY'
            export PATH="/usr/local/bin:/usr/bin:$PATH"
            mkdir -p ~/game-prototype && cd ~/game-prototype
            tar xzf ~/deploy.tar.gz
            rm -f ~/deploy.tar.gz
            npm ci
            pm2 restart game-prototype || pm2 start npm --name game-prototype -- run start:prod
            pm2 save
            sleep 5
            pm2 ls
            curl -sf http://localhost:3001/api/health || { echo "--- PM2 LOGS ---"; pm2 logs game-prototype --nostream --lines 30; exit 1; }
          DEPLOY
