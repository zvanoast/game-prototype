name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Clone or update repo
            cd ~/game-prototype || { git clone https://github.com/${{ github.repository }}.git ~/game-prototype && cd ~/game-prototype; }
            git fetch origin main
            git reset --hard origin/main

            # Run idempotent setup (node, pm2, nginx, ssl)
            bash scripts/ec2-setup.sh

            # Install deps and build client
            npm ci
            npm run build:client

            # Start or restart the game server
            pm2 restart game-prototype || pm2 start npm --name game-prototype -- run start:prod
            pm2 save
