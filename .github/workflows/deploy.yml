name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build:client

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "client/dist,client/package.json,server,shared,package.json,package-lock.json,scripts"
          target: ~/game-prototype
          overwrite: true
          rm: true

      - name: Setup and restart server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/game-prototype

            # Run idempotent setup (node, pm2, nginx, ssl)
            bash scripts/ec2-setup.sh

            # Install production deps
            npm ci

            # Start or restart the game server
            pm2 restart game-prototype || pm2 start npm --name game-prototype -- run start:prod
            pm2 save

            # Wait a moment then verify the server is healthy
            sleep 5
            pm2 ls
            curl -sf http://localhost:3001/api/health || { echo "--- PM2 LOGS ---"; pm2 logs game-prototype --nostream --lines 30; exit 1; }
