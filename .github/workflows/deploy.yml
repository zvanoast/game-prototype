name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_setup:
        description: "Run EC2 setup script (first deploy or infra changes)"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build:client

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "client/dist,client/package.json,server,shared,package.json,package-lock.json,scripts"
          target: ~/game-prototype
          overwrite: true
          rm: true

      - name: EC2 setup (first deploy only)
        if: ${{ github.event.inputs.run_setup == 'true' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd ~/game-prototype
            bash scripts/ec2-setup.sh

      - name: Install deps and restart server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 3m
          script: |
            export PATH="/usr/local/bin:/usr/bin:$PATH"
            cd ~/game-prototype
            npm ci
            pm2 restart game-prototype || pm2 start npm --name game-prototype -- run start:prod
            pm2 save

            # Verify server is healthy
            sleep 5
            pm2 ls
            curl -sf http://localhost:3001/api/health || { echo "--- PM2 LOGS ---"; pm2 logs game-prototype --nostream --lines 30; exit 1; }
